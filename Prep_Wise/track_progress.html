<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Progress - PrepWise</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Manrope', sans-serif;
    background:#0d0f14;
    color:#e8eaf0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px;
    position:relative;
  }

  body::before, body::after {
    content:"";
    position:absolute;
    filter:blur(80px);
    z-index:-1;
  }

  body::before {
    width:600px; height:600px;
    background: radial-gradient(circle, rgba(108,140,255,0.2), transparent 70%);
    top:-100px; left:-100px;
  }

  body::after {
    width:500px; height:500px;
    background: radial-gradient(circle, rgba(255,107,107,0.15), transparent 70%);
    bottom:-120px; right:-120px;
  }

  .home-icon {
    position:absolute;
    top:20px;
    left:20px;
    width:36px;
    height:36px;
    background:#12141d;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
    transition:0.3s;
  }

  .home-icon:hover { background:#1a1c28; }

  .home-icon svg { width:20px; height:20px; fill:#6c8cff; }

  h1 { font-size:48px; font-weight:700; background:linear-gradient(90deg,#6c8cff,#ff6b6b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:20px; }

  .card {
    background:#12141d;
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:700px;
    margin-bottom:30px;
    box-shadow:0 0 50px rgba(0,0,0,0.7);
    text-align:left;
  }

  .card h3 {
    margin-bottom:15px;
    font-size:20px;
    color:#6c8cff;
  }

  canvas {
    background:#1a1c28;
    border-radius:15px;
    padding:15px;
  }
</style>
</head>
<body>

<!-- Home icon -->
<a href="dashboard.html" class="home-icon" title="Back to Dashboard">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
<path d="M12 3l10 9h-3v9h-6v-6H11v6H5v-9H2z"/>
</svg>
</a>

<h1>Track Progress</h1>

<!-- Solved Problems Chart -->
<div class="card">
  <h3>Solved Problems Over Time</h3>
  <canvas id="solvedProblemsChart"></canvas>
</div>

<!-- Interview Logs Chart -->
<div class="card">
  <h3>Interview Logs</h3>
  <canvas id="interviewLogsChart"></canvas>
</div>

<script>
  // Sample data (replace with dynamic data from backend)
  const solvedProblemsData = {
    labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4', 'Week 5', 'Week 6'],
    datasets: [{
      label: 'Problems Solved',
      data: [5, 8, 12, 15, 20, 22],
      fill: true,
      backgroundColor: 'rgba(108,140,255,0.2)',
      borderColor: '#6c8cff',
      tension: 0.3
    }]
  };

  const solvedProblemsConfig = {
    type: 'line',
    data: solvedProblemsData,
    options: {
      responsive:true,
      plugins: {
        legend: { labels: { color:'#e8eaf0' } }
      },
      scales: {
        x: { ticks:{color:'#e8eaf0'} },
        y: { ticks:{color:'#e8eaf0'} }
      }
    }
  };

  new Chart(
    document.getElementById('solvedProblemsChart'),
    solvedProblemsConfig
  );

  // Interview Logs Bar Chart
  const interviewLogsData = {
    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
    datasets: [{
      label: 'Interviews Attempted',
      data: [2, 3, 1, 4, 3, 5],
      backgroundColor: '#ff6b6b'
    }]
  };

  const interviewLogsConfig = {
    type: 'bar',
    data: interviewLogsData,
    options: {
      responsive:true,
      plugins: {
        legend: { labels:{ color:'#e8eaf0' } }
      },
      scales: {
        x: { ticks:{color:'#e8eaf0'} },
        y: { ticks:{color:'#e8eaf0'} }
      }
    }
  };

  new Chart(
    document.getElementById('interviewLogsChart'),
    interviewLogsConfig
  );
</script>

</body>
</html>
