<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrepWise</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Manrope', sans-serif;
    background: #0d0f14;
    color: #e8eaf0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Background Glow */
  body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(108,140,255,0.2), transparent 70%);
    top: -100px;
    left: -100px;
    filter: blur(80px);
  }

  body::after {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(255,107,107,0.15), transparent 70%);
    bottom: -120px;
    right: -120px;
    filter: blur(80px);
  }

  .container {
    text-align: center;
    z-index: 2;
  }

  .title {
    font-size: 48px;
    font-weight: 700;
    background: linear-gradient(90deg, #6c8cff, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }

  .subtitle {
    color: #7a8099;
    margin-bottom: 40px;
    font-size: 16px;
  }

  .buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
  }

  .btn {
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s;
  }

  .btn-primary {
    background: #6c8cff;
    color: white;
  }

  .btn-primary:hover {
    background: #5a76e0;
  }

  .btn-secondary {
    border: 1px solid #252a3a;
    color: #e8eaf0;
  }

  .btn-secondary:hover {
    background: #151820;
  }

  /* Floating animation */
  .container {
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
  }

</style>
</head>

<body>

<div class="container">
  <h1 class="title">PrepWise</h1>
  <p class="subtitle">Track • Improve • Succeed</p>

  <div class="buttons">
    <a href="login.html" class="btn btn-primary">Login</a>
    <a href="register.html" class="btn btn-secondary">Register</a>
  </div>
</div>

</body>
</html>
