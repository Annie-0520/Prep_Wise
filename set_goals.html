<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Goals - PrepWise</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Manrope', sans-serif;
    background:#0d0f14;
    color:#e8eaf0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 20px;
    position:relative;
  }

  body::before, body::after {
    content:"";
    position:absolute;
    filter:blur(80px);
    z-index:-1;
  }

  body::before {
    width:600px; height:600px;
    background: radial-gradient(circle, rgba(108,140,255,0.2), transparent 70%);
    top:-100px; left:-100px;
  }

  body::after {
    width:500px; height:500px;
    background: radial-gradient(circle, rgba(255,107,107,0.15), transparent 70%);
    bottom:-120px; right:-120px;
  }

  .home-icon {
    position:absolute;
    top:20px;
    left:20px;
    width:36px;
    height:36px;
    background:#12141d;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
    transition:0.3s;
  }

  .home-icon:hover { background:#1a1c28; }
  .home-icon svg { width:20px; height:20px; fill:#6c8cff; }

  h1 { font-size:48px; font-weight:700; background:linear-gradient(90deg,#6c8cff,#ff6b6b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:20px; }

  .card {
    background:#12141d;
    padding:30px;
    border-radius:20px;
    width:100%;
    max-width:700px;
    margin-bottom:20px;
    box-shadow:0 0 50px rgba(0,0,0,0.7);
    text-align:left;
  }

  .card h3 { margin-bottom:10px; font-size:20px; color:#6c8cff; }
  .card p { color:#e8eaf0; font-size:14px; margin-bottom:10px; }

  input[type="text"] {
    width:100%;
    padding:10px 15px;
    border-radius:10px;
    border:none;
    margin-bottom:10px;
    background:#1a1c28;
    color:#e8eaf0;
  }

  .btn-primary {
    background:#6c8cff;
    color:white;
    padding:12px 28px;
    border-radius:10px;
    font-weight:600;
    text-decoration:none;
    display:inline-block;
    margin-top:10px;
    border:none;
    cursor:pointer;
  }

  .btn-primary:hover { background:#5a76e0; }
</style>
</head>
<body>

<!-- Home icon -->
<a href="dashboard.html" class="home-icon" title="Back to Dashboard">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
<path d="M12 3l10 9h-3v9h-6v-6H11v6H5v-9H2z"/>
</svg>
</a>

<h1>Set Goals</h1>

<!-- Daily Goals Card -->
<div class="card">
  <h3>Daily Goals</h3>
  <p>Set tasks for today to stay on track with your studies.</p>
  <input type="text" id="dailyGoal" placeholder="Enter your daily goal">
  <button class="btn-primary" onclick="saveGoal('dailyGoal')">Save Goal</button>
</div>

<!-- Weekly Goals Card -->
<div class="card">
  <h3>Weekly Goals</h3>
  <p>Plan your weekly targets to improve consistency and progress.</p>
  <input type="text" id="weeklyGoal" placeholder="Enter your weekly goal">
  <button class="btn-primary" onclick="saveGoal('weeklyGoal')">Save Goal</button>
</div>

<!-- Monthly Goals Card -->
<div class="card">
  <h3>Monthly Goals</h3>
  <p>Set long-term objectives to achieve bigger milestones.</p>
  <input type="text" id="monthlyGoal" placeholder="Enter your monthly goal">
  <button class="btn-primary" onclick="saveGoal('monthlyGoal')">Save Goal</button>
</div>

<script>
  // Function to save goal in localStorage
  function saveGoal(id) {
    const goalText = document.getElementById(id).value.trim();
    if(goalText === "") {
      alert("Please enter a goal first!");
      return;
    }
    localStorage.setItem(id, goalText);
    alert("Goal saved successfully!");
    document.getElementById(id).value = "";
  }

  // Load saved goals on page load
  window.onload = () => {
    const daily = localStorage.getItem('dailyGoal');
    if(daily) document.getElementById('dailyGoal').placeholder = daily;

    const weekly = localStorage.getItem('weeklyGoal');
    if(weekly) document.getElementById('weeklyGoal').placeholder = weekly;

    const monthly = localStorage.getItem('monthlyGoal');
    if(monthly) document.getElementById('monthlyGoal').placeholder = monthly;
  }
</script>

</body>
</html>
